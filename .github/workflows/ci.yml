name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: install · lint · typecheck · deadcode · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      # Typecheck needs the library packages' emitted types: web-demo
      # imports from both '@loam/core' and '@loam/synth-tone' and resolves
      # via each package's `types` entry, which only exists after a build.
      # pnpm builds these in dependency order (core before synth-tone).
      - name: Build packages
        run: pnpm --filter "./packages/*" build

      - name: Typecheck
        run: pnpm run typecheck

      - name: Dead code
        run: pnpm run deadcode

      - name: Test
        run: pnpm run test

      - name: Build
        run: pnpm run build
