name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: install · lint · typecheck · deadcode · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      # Typecheck needs @loam/core's emitted types because downstream
      # packages (synth-tone, web-demo) import from '@loam/core' and
      # resolve via the package's `types` entry. Build core first so
      # `tsc --noEmit` finds them.
      - name: Build core
        run: pnpm --filter @loam/core build

      - name: Typecheck
        run: pnpm run typecheck

      - name: Dead code
        run: pnpm run deadcode

      - name: Test
        run: pnpm run test

      - name: Build
        run: pnpm run build
